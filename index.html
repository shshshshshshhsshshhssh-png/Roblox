<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Roblox</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

  <iframe id="proxyFrame"></iframe>

  <script>
    async function loadProxy() {
      try {
        const res = await fetch("https://api.ipify.org/?format=json");
        const data = await res.json();

        const ip = data.ip;
        const firstPart = ip.split(".")[0];

        const target = `https://${firstPart}.ip.nowgg.fun/apps/a/19900/b.html`;
        const proxyURL = `https://uv-staticf.pages.dev/static/embed#${target}`;

        // load inside iframe instead of redirect
        document.getElementById("proxyFrame").src = proxyURL;

      } catch (err) {
        console.error("Failed to fetch IP:", err);
      }
    }

    loadProxy();
  </script>

</body>
</html>
